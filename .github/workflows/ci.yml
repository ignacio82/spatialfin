name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Assemble shipped debug variants
      run: ./gradlew :app:unified:assembleLibreDebug :app:unified:assembleTvDebug

    - name: Run debug unit tests
      run: |
        ./gradlew \
          :app:unified:testLibreDebugUnitTest \
          :app:unified:testTvDebugUnitTest \
          :core:testLibreDebugUnitTest \
          :data:testDebugUnitTest \
          :fcast:testDebugUnitTest \
          :modes:film:testDebugUnitTest \
          :player:beam:testDebugUnitTest \
          :player:core:testDebugUnitTest \
          :player:local:testDebugUnitTest \
          :player:session:testDebugUnitTest \
          :player:tv:testDebugUnitTest \
          :player:xr:testDebugUnitTest \
          :settings:testDebugUnitTest \
          :setup:testDebugUnitTest

    - name: Check Compose stability baselines
      run: |
        ./gradlew \
          :app:unified:libreDebugStabilityCheck \
          :app:unified:tvDebugStabilityCheck \
          :core:libreDebugStabilityCheck \
          :fcast:debugStabilityCheck \
          :modes:film:debugStabilityCheck \
          :player:beam:debugStabilityCheck \
          :player:session:debugStabilityCheck \
          :player:tv:debugStabilityCheck \
          :player:xr:debugStabilityCheck
